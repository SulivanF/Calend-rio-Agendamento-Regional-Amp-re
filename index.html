<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Regional Ampére</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- HEADER -->
        <header class="flex items-center justify-between bg-[#111111] p-6 rounded-2xl border border-[#222222] shadow-xl">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-indigo-600/10 text-indigo-400 rounded-xl border border-indigo-500/20">
                    <i data-lucide="map-pin" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Agenda Regional Ampére</h1>
                </div>
            </div>
        </header>

        <!-- CONTAINER DE ALERTAS DE EVENTOS (NOVO) -->
        <div id="events-display-top" class="bg-[#111111] p-6 rounded-2xl border border-[#222222] shadow-xl hidden">
            <h2 id="top-date-title" class="text-lg font-bold mb-4 text-indigo-400"></h2>
            <div id="top-events-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- GRID PRINCIPAL -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- CALENDÁRIO -->
            <div class="lg:col-span-2 bg-[#111111] p-6 rounded-2xl border border-[#222222] shadow-xl space-y-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button id="prev-month" class="p-2 hover:bg-neutral-800 rounded-lg"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <h2 id="month-year" class="text-lg font-semibold capitalize"></h2>
                        <button id="next-month" class="p-2 hover:bg-neutral-800 rounded-lg"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    <button id="go-today" class="px-4 py-2 bg-neutral-800 hover:bg-neutral-700 text-sm rounded-xl">Ir para hoje</button>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold uppercase opacity-60">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>
                <div id="days-grid" class="grid grid-cols-7 gap-2"></div>
            </div>

            <!-- PAINEL -->
            <div class="bg-[#111111] p-6 rounded-2xl border border-[#222222] shadow-xl flex flex-col min-h-[450px]">
                <div class="space-y-4 flex-grow">
                    <div>
                        <span class="text-[10px] font-bold text-indigo-400 uppercase">Data Selecionada</span>
                        <h3 id="date-title" class="text-md font-bold">Selecione um dia</h3>
                    </div>

                    <!-- BOTÕES -->
                    <button id="btn-vacation" class="w-full flex items-center justify-center gap-2 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-medium transition-all">
                        <i data-lucide="sun" class="w-4 h-4"></i> Férias
                    </button>
                    <button id="btn-audit" class="w-full flex items-center justify-center gap-2 py-3 bg-red-600 hover:bg-red-500 rounded-xl font-medium transition-all">
                        <i data-lucide="alert-triangle" class="w-4 h-4"></i> Auditoria
                    </button>
                    <button id="btn-medical" class="w-full flex items-center justify-center gap-2 py-3 bg-yellow-500 hover:bg-yellow-400 text-black rounded-xl font-medium transition-all">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Atestado
                    </button>
                    <button id="btn-other" class="w-full flex items-center justify-center gap-2 py-3 bg-orange-600 hover:bg-orange-500 rounded-xl font-medium transition-all">
                        <i data-lucide="plus" class="w-4 h-4"></i> Adicionar Evento
                    </button>

                    <div id="input-area" class="space-y-2 hidden border-t border-neutral-800 pt-4">
                        <p id="type-label" class="text-xs font-bold text-indigo-400 uppercase"></p>
                        <textarea id="event-text" class="w-full p-3 bg-neutral-900 border border-neutral-700 rounded-xl text-sm outline-none" placeholder="Digite o compromisso..."></textarea>
                        <input type="hidden" id="event-type">
                        <button id="save-event" class="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm font-bold">Salvar</button>
                    </div>
                    <div id="events-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let current = new Date();
        let selectedDate = "";
        let data = JSON.parse(localStorage.getItem('agenda_data')) || { events: {} };
        const today = new Date();
        const todayKey = `${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;

        function getLabelByType(type) {
            const map = { 'vacation': 'Férias', 'audit': 'Auditoria', 'medical': 'Atestado', 'other': 'Outro Evento' };
            return map[type] || 'Evento';
        }

        function getColorByType(type) {
            const map = { 'vacation': 'border-emerald-500 text-emerald-200 bg-emerald-900/20', 'audit': 'border-red-500 text-red-200 bg-red-900/20', 'medical': 'border-yellow-500 text-yellow-200 bg-yellow-900/20', 'other': 'border-orange-500 text-orange-200 bg-orange-900/20' };
            return map[type] || 'border-neutral-500 text-neutral-200 bg-neutral-900/20';
        }

        function selectType(type, label) {
            document.getElementById('event-type').value = type;
            document.getElementById('type-label').textContent = `Tipo selecionado: ${label}`;
            document.getElementById('input-area').classList.remove('hidden');
        }

        function render() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = "";
            const year = current.getFullYear();
            const month = current.getMonth();
            const first = new Date(year, month, 1).getDay();
            const last = new Date(year, month + 1, 0).getDate();
            
            document.getElementById('month-year').textContent = current.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d<=last; d++) {
                const key = `${year}-${month+1}-${d}`;
                const btn = document.createElement('button');
                btn.textContent = d;
                const dayEvents = data.events[key] || [];
                const isToday = key === todayKey;
                
                let classes = `p-4 rounded-xl text-sm font-bold transition-all border `;
                if (isToday) classes += 'bg-indigo-600 ring-4 ring-indigo-500/50 border-indigo-400 ';
                else if (dayEvents.length > 0) {
                    const type = dayEvents[dayEvents.length - 1].type;
                    classes += getColorByType(type).split(' ')[2] + ' ' + getColorByType(type).split(' ')[1] + ' ';
                } else classes += 'bg-neutral-900 border-neutral-800 hover:bg-neutral-800 ';

                if(selectedDate === key) classes += 'ring-2 ring-white ';
                
                btn.className = classes;
                btn.onclick = () => {
                    selectedDate = key;
                    document.getElementById('date-title').textContent = new Date(year, month, d).toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'short' });
                    renderEvents();
                };
                grid.appendChild(btn);
            }
            lucide.createIcons();
        }

        function renderEvents() {
            const list = document.getElementById('events-list');
            const topDisplay = document.getElementById('events-display-top');
            const topList = document.getElementById('top-events-list');
            const topTitle = document.getElementById('top-date-title');
            
            list.innerHTML = "";
            topList.innerHTML = "";
            const dayEvents = data.events[selectedDate] || [];
            
            if (dayEvents.length > 0) {
                topDisplay.classList.remove('hidden');
                topTitle.textContent = `Eventos em ${new Date(selectedDate).toLocaleDateString('pt-BR')}`;
            } else {
                topDisplay.classList.add('hidden');
            }

            dayEvents.forEach((e, i) => {
                const colorClasses = getColorByType(e.type);
                const html = `
                    <div class="p-4 bg-neutral-900 rounded-xl border-l-4 ${colorClasses} flex justify-between items-center shadow-lg">
                        <div>
                            <p class="text-[10px] font-bold uppercase opacity-70">${getLabelByType(e.type)}</p>
                            <p class="font-medium">${e.text}</p>
                        </div>
                        <button onclick="deleteEvent(${i})" class="text-neutral-500 hover:text-white"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>`;
                list.innerHTML += html;
                topList.innerHTML += html;
            });
            lucide.createIcons();
        }

        window.deleteEvent = (index) => {
            data.events[selectedDate].splice(index, 1);
            localStorage.setItem('agenda_data', JSON.stringify(data));
            render();
            renderEvents();
        };

        document.getElementById('save-event').onclick = () => {
            const text = document.getElementById('event-text').value;
            const type = document.getElementById('event-type').value;
            if(!text || !selectedDate) return;
            if(!data.events[selectedDate]) data.events[selectedDate] = [];
            data.events[selectedDate].push({ text, type });
            localStorage.setItem('agenda_data', JSON.stringify(data));
            document.getElementById('event-text').value = "";
            document.getElementById('input-area').classList.add('hidden');
            render();
            renderEvents();
        };

        document.getElementById('btn-vacation').onclick = () => selectType('vacation', 'Férias');
        document.getElementById('btn-audit').onclick = () => selectType('audit', 'Auditoria');
        document.getElementById('btn-medical').onclick = () => selectType('medical', 'Atestado');
        document.getElementById('btn-other').onclick = () => selectType('other', 'Evento');

        document.getElementById('prev-month').onclick = () => { current.setMonth(current.getMonth()-1); render(); };
        document.getElementById('next-month').onclick = () => { current.setMonth(current.getMonth()+1); render(); };
        document.getElementById('go-today').onclick = () => { current = new Date(); selectedDate = todayKey; render(); renderEvents(); };

        render();
    </script>
</body>
</html>
